services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: invite_op
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  invite-op:
    build:
      context: .
      args:
        VERSION: dev
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
    environment:
      INVITE_STORAGE_TYPE: mongodb
      INVITE_STORAGE_MONGODB_URI: "mongodb://mongodb:27017"
      INVITE_STORAGE_MONGODB_DATABASE: invite_op
      INVITE_LOGGING_LEVEL: debug
      INVITE_LOGGING_FORMAT: text
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
