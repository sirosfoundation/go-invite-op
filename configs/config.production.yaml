server:
  host: "0.0.0.0"
  port: 8080
  admin_port: 8081
  # admin_token_path: "/run/secrets/admin-token"
  base_url: "https://invite.example.com"
  cors:
    allowed_origins:
      - "https://app.example.com"
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Authorization", "Content-Type", "X-Tenant-ID"]
    allow_credentials: true
    max_age: 43200
  tls:
    enabled: true
    cert_file: "/etc/tls/server.crt"
    key_file: "/etc/tls/server.key"
    min_version: "1.2"
  # admin_tls:
  #   enabled: true
  #   cert_file: "/etc/tls/admin.crt"
  #   key_file: "/etc/tls/admin.key"

storage:
  type: "mongodb"
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "invite_op"
    timeout: 10
    # password_path: "/run/secrets/mongodb-password"
    tls_enabled: true
    ca_path: "/etc/tls/mongo-ca.crt"
    # cert_path: "/etc/tls/mongo-client.crt"
    # key_path: "/etc/tls/mongo-client.key"

logging:
  level: "info"
  format: "json"

jwt:
  # secret: ""  # Use secret_path in production
  secret_path: "/run/secrets/jwt-secret"
  issuer: "go-invite-op"

smtp:
  host: "smtp.example.com"
  port: 587
  username: "noreply@example.com"
  # password: ""  # Use password_path instead for production
  password_path: "/run/secrets/smtp-password"
  from: "noreply@example.com"

op:
  session_timeout: 600
  cleanup_interval: 3600
  rate_limit:
    enabled: true
    max_attempts: 10
    window_seconds: 60
    lockout_seconds: 300
